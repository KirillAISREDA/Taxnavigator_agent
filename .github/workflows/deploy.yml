name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          if echo "$CHANGED" | grep -qE "(Dockerfile|requirements|docker-compose)"; then
            echo "infra=true" >> $GITHUB_OUTPUT
          else
            echo "infra=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "app/,crawler/,config/,Dockerfile,Dockerfile.crawler,docker-compose.yml,requirements.txt,requirements.crawler.txt,deploy.sh,webhook/"
          target: /opt/Taxnavigator_agent
          overwrite: true

      - name: Build and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/Taxnavigator_agent

            echo "=== $(date) — Deploy started ==="

            # Rebuild if infrastructure files changed
            if [ "${{ steps.changes.outputs.infra }}" = "true" ]; then
              echo "📦 Infrastructure changed — full rebuild"
              docker compose down
              docker compose up -d --build
            else
              echo "♻️ Code only — rebuilding API"
              docker compose build api
              docker compose up -d --no-deps api
            fi

            # Wait and health check
            sleep 15
            curl -sf http://localhost:8100/health && echo "✅ Deploy OK" || echo "⚠️ Health check issue"

            # Cleanup
            docker image prune -f

            echo "=== $(date) — Deploy finished ==="
