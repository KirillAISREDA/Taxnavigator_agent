name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/Taxnavigator_agent

            echo "=== $(date) — Deploy started ==="

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code pulled: $(git log -1 --pretty='%h %s')"

            # Check what changed
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")

            # Rebuild if infrastructure files changed
            if echo "$CHANGED" | grep -qE "(Dockerfile|requirements|docker-compose)"; then
              echo "📦 Infrastructure changed — full rebuild"
              docker compose build --no-cache && docker compose up -d --force-recreate || {
                echo "⚠️ Build failed — using docker cp fallback"
                docker cp app/ taxnav-api:/app/app/
                docker cp config/ taxnav-api:/app/config/
                docker restart taxnav-api
              }
            else
              echo "♻️ Code only — updating API"
              docker compose build api && docker compose up -d --no-deps api || {
                echo "⚠️ Build failed — using docker cp fallback"
                docker cp app/ taxnav-api:/app/app/
                docker cp config/ taxnav-api:/app/config/
                docker restart taxnav-api
              }
            fi

            # Wait and health check
            sleep 15
            curl -sf http://localhost:8100/health && echo "✅ Deploy OK" || echo "⚠️ Health check issue"

            # Cleanup
            docker image prune -f

            echo "=== $(date) — Deploy finished ==="
