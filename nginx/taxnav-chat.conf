# TaxNavigator AI Agent — Nginx reverse proxy configuration
# Add this to your existing nginx config or use as a new server block
#
# If you use Portainer's built-in Traefik or another reverse proxy,
# adapt accordingly.

server {
    listen 80;
    server_name chat.taxnavigator-advice.nl;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.taxnavigator-advice.nl;

    # SSL certificates (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/chat.taxnavigator-advice.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.taxnavigator-advice.nl/privkey.pem;

    # Proxy to the API container
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=chatapi:10m rate=30r/m;
    location /api/chat/ {
        limit_req zone=chatapi burst=10 nodelay;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
