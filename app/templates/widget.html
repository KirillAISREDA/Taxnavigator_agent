<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxNavigator Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1B4D3E;
      --primary-light: #2A7A5F;
      --bg: #F8F9FA;
      --white: #FFFFFF;
      --gray-100: #F1F3F5;
      --gray-300: #DEE2E6;
      --gray-500: #868E96;
      --gray-800: #343A40;
      --text: #212529;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--primary);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-logo {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; }
    .header-info p { font-size: 12px; opacity: 0.8; }
    .header-close {
      margin-left: auto;
      background: none; border: none; color: white;
      cursor: pointer; font-size: 20px; opacity: 0.7;
      padding: 4px 8px;
    }
    .header-close:hover { opacity: 1; }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: var(--shadow);
    }
    .message.user {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .message .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--gray-300);
      font-size: 11px;
      color: var(--gray-500);
    }
    .message .sources a {
      color: var(--primary-light);
      text-decoration: none;
    }

    .typing-indicator {
      display: flex; gap: 4px; padding: 12px 16px;
      background: var(--white); border-radius: 16px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: var(--shadow);
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      background: var(--gray-300);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Escalation banner */
    .escalation {
      background: #FFF3CD;
      border: 1px solid #FFECB5;
      border-radius: 12px;
      padding: 12px 16px;
      margin: 4px 0;
      font-size: 13px;
      color: #664D03;
      align-self: flex-start;
      max-width: 85%;
    }
    .escalation a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 12px;
    }
    .quick-action {
      background: var(--white);
      border: 1px solid var(--gray-300);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--gray-800);
    }
    .quick-action:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #F0F7F4;
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      background: var(--white);
      border-top: 1px solid var(--gray-100);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      border: 1px solid var(--gray-300);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus {
      border-color: var(--primary);
    }
    .input-area button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .input-area button:hover { background: var(--primary-light); }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Language selector */
    .lang-bar {
      display: flex; justify-content: center; gap: 4px;
      padding: 8px;
      background: var(--gray-100);
      font-size: 12px;
    }
    .lang-bar button {
      background: none; border: 1px solid transparent;
      border-radius: 12px; padding: 4px 10px;
      cursor: pointer; color: var(--gray-500);
      transition: all 0.2s;
    }
    .lang-bar button.active, .lang-bar button:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--white);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🧭</div>
    <div class="header-info">
      <h1>TaxNavigator Assistant</h1>
      <p>Online — antwoord binnen seconden</p>
    </div>
    <button class="header-close" onclick="parent.postMessage('taxnav-close','*')" title="Sluiten">&times;</button>
  </div>

  <!-- Language bar -->
  <div class="lang-bar">
    <button class="active" data-lang="nl">NL</button>
    <button data-lang="uk">UA</button>
    <button data-lang="ru">RU</button>
    <button data-lang="en">EN</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="message bot">
      Welkom bij TaxNavigator & Advice! 👋<br><br>
      Ik kan u helpen met vragen over belastingen, bedrijfsregistratie, boekhouding en meer.
      Hoe kan ik u helpen?
    </div>
  </div>

  <!-- Quick actions (shown initially) -->
  <div class="quick-actions" id="quickActions">
    <div class="quick-action" onclick="sendQuick('Wat zijn jullie diensten?')">📋 Diensten</div>
    <div class="quick-action" onclick="sendQuick('Hoe registreer ik een bedrijf?')">🏢 KVK registratie</div>
    <div class="quick-action" onclick="sendQuick('BTW aangifte uitleg')">💰 BTW</div>
    <div class="quick-action" onclick="sendQuick('Ik ben Oekraïner, wat zijn mijn rechten?')">🇺🇦 Для українців</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="input" placeholder="Stel uw vraag..." autocomplete="off">
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const API_URL = '/api/chat/';
    let sessionId = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const quickActionsEl = document.getElementById('quickActions');

    // Language switcher
    document.querySelectorAll('.lang-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.lang-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const lang = btn.dataset.lang;
        const greetings = {
          nl: 'Stel uw vraag...',
          uk: 'Поставте своє запитання...',
          ru: 'Задайте ваш вопрос...',
          en: 'Ask your question...',
        };
        inputEl.placeholder = greetings[lang] || greetings.en;
      });
    });

    // Send on Enter
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function sendQuick(text) {
      inputEl.value = text;
      sendMessage();
    }

    function addMessage(text, type, sources = []) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = text.replace(/\n/g, '<br>');

      if (sources.length > 0 && type === 'bot') {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        srcDiv.innerHTML = '📎 ' + sources
          .filter(s => s)
          .map(s => `<a href="${s}" target="_blank">${new URL(s).hostname}</a>`)
          .join(' · ');
        div.appendChild(srcDiv);
      }

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addEscalation() {
      const div = document.createElement('div');
      div.className = 'escalation';
      div.innerHTML = '💡 Wilt u een afspraak maken met onze specialist? <a href="https://taxnavigator-advice.nl/#contact" target="_blank">Neem contact op</a>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // Hide quick actions after first message
      quickActionsEl.style.display = 'none';

      addMessage(text, 'user');
      inputEl.value = '';
      sendBtn.disabled = true;
      showTyping();

      try {
        const resp = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            session_id: sessionId,
            channel: 'web',
          }),
        });
        const data = await resp.json();

        hideTyping();
        sessionId = data.session_id;
        addMessage(data.response, 'bot', data.sources);

        if (data.needs_escalation) {
          addEscalation();
        }
      } catch (err) {
        hideTyping();
        addMessage('Er is een fout opgetreden. Probeer het opnieuw.', 'bot');
        console.error('Chat error:', err);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
