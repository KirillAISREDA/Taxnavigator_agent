<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaxNavigator Chat</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--pri:#1B4D3E;--pri-l:#2A7A5F;--bg:#F8F9FA;--wh:#FFF;--g1:#F1F3F5;--g3:#DEE2E6;--g5:#868E96;--g8:#343A40;--tx:#212529;--sh:0 2px 8px rgba(0,0,0,.08)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column}
    .header{background:var(--pri);color:#fff;padding:calc(16px + env(safe-area-inset-top)) 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .header-logo{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .header-info h1{font-size:15px;font-weight:600}.header-info p{font-size:12px;opacity:.8}
    .header-close{margin-left:auto;background:none;border:none;color:#fff;cursor:pointer;font-size:20px;opacity:.7;padding:4px 8px}.header-close:hover{opacity:1}
    .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
    .message{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;animation:fadeIn .3s ease;white-space:pre-wrap}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .message.bot{background:var(--wh);color:var(--tx);border-bottom-left-radius:4px;align-self:flex-start;box-shadow:var(--sh)}
    .message.user{background:var(--pri);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
    .message .sources{margin-top:8px;padding-top:8px;border-top:1px solid var(--g3);font-size:11px;color:var(--g5)}
    .message .sources a{color:var(--pri-l);text-decoration:none}
    .message .file-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:10px;font-size:12px;margin-bottom:6px}
    .message.bot .file-badge{background:#E8F5E9;color:#2E7D32}
    .message .file-thumb{max-width:180px;max-height:120px;border-radius:8px;margin-bottom:8px;display:block}
    .typing-indicator{display:flex;gap:4px;padding:12px 16px;background:var(--wh);border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start;box-shadow:var(--sh)}
    .typing-indicator span{width:8px;height:8px;background:var(--g3);border-radius:50%;animation:bounce 1.4s infinite}
    .typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    .escalation{background:#FFF3CD;border:1px solid #FFECB5;border-radius:12px;padding:12px 16px;margin:4px 0;font-size:13px;color:#664D03;align-self:flex-start;max-width:85%}
    .escalation a{color:var(--pri);font-weight:600;text-decoration:none}
    .quick-actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px}
    .quick-action{background:var(--wh);border:1px solid var(--g3);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;transition:all .2s;color:var(--g8)}
    .quick-action:hover{border-color:var(--pri);color:var(--pri);background:#F0F7F4}
    .file-bar{display:none;padding:8px 16px;background:var(--g1);border-top:1px solid var(--g3);align-items:center;gap:10px;flex-shrink:0}
    .file-bar.active{display:flex}
    .file-bar img{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--g3)}
    .file-bar .icon{width:44px;height:44px;border-radius:8px;background:var(--wh);border:1px solid var(--g3);display:flex;align-items:center;justify-content:center;font-size:20px}
    .file-bar .info{flex:1;min-width:0}
    .file-bar .name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .file-bar .size{font-size:11px;color:var(--g5)}
    .file-bar .rm{background:none;border:none;cursor:pointer;font-size:18px;color:var(--g5);padding:4px}.file-bar .rm:hover{color:var(--tx)}
    .drop-overlay{display:none;position:fixed;inset:0;background:rgba(27,77,62,.12);z-index:100;align-items:center;justify-content:center;pointer-events:none}
    .drop-overlay.active{display:flex}
    .drop-box{background:var(--wh);border:2px dashed var(--pri);border-radius:16px;padding:32px 48px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1)}
    .drop-box .ic{font-size:40px}.drop-box p{font-size:16px;font-weight:500;color:var(--pri);margin-top:8px}
    .input-area{padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--wh);border-top:1px solid var(--g1);display:flex;gap:8px;align-items:center;flex-shrink:0}
    .input-area input{flex:1;border:1px solid var(--g3);border-radius:24px;padding:10px 16px;font-size:14px;outline:none;transition:border-color .2s}
    .input-area input:focus{border-color:var(--pri)}
    .ib{background:none;border:none;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s;color:var(--g5);flex-shrink:0}
    .ib:hover{background:var(--g1);color:var(--pri)}
    .ib.send{background:var(--pri);color:#fff}.ib.send:hover{background:var(--pri-l)}.ib.send:disabled{opacity:.5;cursor:not-allowed}
    .lang-bar{display:flex;justify-content:center;gap:4px;padding:8px;background:var(--g1);font-size:12px}
    .lang-bar button{background:none;border:1px solid transparent;border-radius:12px;padding:4px 10px;cursor:pointer;color:var(--g5);transition:all .2s}
    .lang-bar button.active,.lang-bar button:hover{border-color:var(--pri);color:var(--pri);background:var(--wh)}
    #fileInput{display:none}
    .ib.recording{background:#E53935;color:#fff;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--g8);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:100001;animation:fadeIn .3s ease}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🧭</div>
  <div class="header-info"><h1>TaxNavigator Assistant</h1><p id="status">Online — antwoord binnen seconden</p></div>
  <button class="header-close" onclick="parent.postMessage('taxnav-close','*')">&times;</button>
</div>
<div class="lang-bar">
  <button class="active" data-lang="nl">NL</button>
  <button data-lang="uk">UA</button>
  <button data-lang="ru">RU</button>
  <button data-lang="en">EN</button>
</div>
<div class="messages" id="messages">
  <div class="message bot" id="welcome"></div>
</div>
<div class="quick-actions" id="qa">
  <div class="quick-action" onclick="sendQuick('Wat zijn jullie diensten?')">📋 Diensten</div>
  <div class="quick-action" onclick="sendQuick('Hoe registreer ik een bedrijf?')">🏢 KVK registratie</div>
  <div class="quick-action" onclick="sendQuick('BTW aangifte uitleg')">💰 BTW</div>
  <div class="quick-action" onclick="sendQuick('Ik ben Oekraïner, wat zijn mijn rechten?')">🇺🇦 Для українців</div>
</div>
<div class="drop-overlay" id="dropOverlay"><div class="drop-box"><div class="ic">📄</div><p id="dropText">Drop uw document hier</p></div></div>
<div class="file-bar" id="fileBar">
  <div id="fileThumb"></div>
  <div class="info"><div class="name" id="fileName"></div><div class="size" id="fileSize"></div></div>
  <button class="rm" onclick="removeFile()">&times;</button>
</div>
<div class="input-area">
  <button class="ib" onclick="document.getElementById('fileInput').click()" title="Upload document">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
  </button>
  <input type="text" id="input" placeholder="Stel uw vraag..." autocomplete="off">
  <button class="ib" id="micBtn" onclick="toggleRecording()" title="Voice message">
    <svg id="micIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <button class="ib send" id="sendBtn" onclick="sendMessage()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>
<input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.gif,.webp,.pdf" onchange="handleFileSelect(this.files[0])">

<script>
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
const API='/api/chat/',API_UP='/api/chat/upload';
let sessionId=null,pendingFile=null,currentLang='nl';
const $m=document.getElementById('messages'),$i=document.getElementById('input'),$s=document.getElementById('sendBtn'),$qa=document.getElementById('qa'),$bar=document.getElementById('fileBar'),$drop=document.getElementById('dropOverlay');

const i18n={
  nl:{
    welcome:'Welkom bij TaxNavigator & Advice! 👋\n\nIk kan u helpen met vragen over belastingen, bedrijfsregistratie, boekhouding en meer.\nU kunt ook documenten en foto\'s uploaden — ik analyseer en vertaal ze voor u.\n\nHoe kan ik u helpen?',
    status:'Online — antwoord binnen seconden',
    placeholder:'Stel uw vraag...',
    quickActions:[
      {label:'📋 Diensten',query:'Wat zijn jullie diensten?'},
      {label:'🏢 KVK registratie',query:'Hoe registreer ik een bedrijf?'},
      {label:'💰 BTW',query:'BTW aangifte uitleg'},
      {label:'🇺🇦 Для українців',query:'Ik ben Oekraïner, wat zijn mijn rechten?'}
    ],
    errorMsg:'Er is een fout opgetreden. Probeer het opnieuw.',
    micError:'Microfoon niet beschikbaar',
    recording:'Opname...',
    escalationText:'Wilt u een afspraak maken met onze specialist?',
    escalationBtn:'Neem contact op',
    dropText:'Drop uw document hier'
  },
  uk:{
    welcome:'Ласкаво просимо до TaxNavigator & Advice! 👋\n\nЯ можу допомогти з питаннями про податки, реєстрацію бізнесу, бухгалтерію та інше.\nВи також можете завантажити документи та фото — я проаналізую та перекладу їх для вас.\n\nЧим можу допомогти?',
    status:'Онлайн — відповідь за кілька секунд',
    placeholder:'Поставте своє запитання...',
    quickActions:[
      {label:'📋 Послуги',query:'Які у вас послуги?'},
      {label:'🏢 Реєстрація KVK',query:'Як зареєструвати бізнес?'},
      {label:'💰 ПДВ',query:'Поясніть подачу ПДВ'},
      {label:'🇺🇦 Для українців',query:'Я українець, які мої права?'}
    ],
    errorMsg:'Сталася помилка. Спробуйте ще раз.',
    micError:'Мікрофон недоступний',
    recording:'Запис...',
    escalationText:'Бажаєте записатися до нашого спеціаліста?',
    escalationBtn:'Зв\'яжіться з нами',
    dropText:'Перетягніть документ сюди'
  },
  ru:{
    welcome:'Добро пожаловать в TaxNavigator & Advice! 👋\n\nЯ могу помочь с вопросами о налогах, регистрации бизнеса, бухгалтерии и многом другом.\nВы также можете загрузить документы и фото — я проанализирую и переведу их для вас.\n\nЧем могу помочь?',
    status:'Онлайн — ответ за несколько секунд',
    placeholder:'Задайте ваш вопрос...',
    quickActions:[
      {label:'📋 Услуги',query:'Какие у вас услуги?'},
      {label:'🏢 Регистрация KVK',query:'Как зарегистрировать бизнес?'},
      {label:'💰 НДС',query:'Объясните подачу НДС'},
      {label:'🇺🇦 Для українців',query:'Я украинец, какие у меня права?'}
    ],
    errorMsg:'Произошла ошибка. Попробуйте ещё раз.',
    micError:'Микрофон недоступен',
    recording:'Запись...',
    escalationText:'Хотите записаться к нашему специалисту?',
    escalationBtn:'Свяжитесь с нами',
    dropText:'Перетащите документ сюда'
  },
  en:{
    welcome:'Welcome to TaxNavigator & Advice! 👋\n\nI can help you with questions about taxes, business registration, accounting and more.\nYou can also upload documents and photos — I\'ll analyse and translate them for you.\n\nHow can I help you?',
    status:'Online — reply within seconds',
    placeholder:'Ask your question...',
    quickActions:[
      {label:'📋 Services',query:'What are your services?'},
      {label:'🏢 KVK registration',query:'How do I register a business?'},
      {label:'💰 VAT',query:'Explain VAT filing'},
      {label:'🇺🇦 For Ukrainians',query:'I am Ukrainian, what are my rights?'}
    ],
    errorMsg:'An error occurred. Please try again.',
    micError:'Microphone not available',
    recording:'Recording...',
    escalationText:'Would you like to book an appointment with our specialist?',
    escalationBtn:'Contact us',
    dropText:'Drop your document here'
  }
};

function applyLanguage(lang){
  const t=i18n[lang]||i18n.nl;
  currentLang=lang;
  document.getElementById('welcome').innerHTML=escHtml(t.welcome).replace(/\n/g,'<br>');
  document.getElementById('status').textContent=t.status;
  $i.placeholder=t.placeholder;
  document.getElementById('dropText').textContent=t.dropText;
  $qa.innerHTML=t.quickActions.map(a=>`<div class="quick-action" onclick="sendQuick('${a.query.replace(/'/g,"\\'")}')">${a.label}</div>`).join('');
  document.querySelectorAll('.lang-bar button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
}

document.querySelectorAll('.lang-bar button').forEach(b=>{b.addEventListener('click',()=>applyLanguage(b.dataset.lang))});
$i.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});

// drag & drop
let dc=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dc++;$drop.classList.add('active')});
document.addEventListener('dragleave',e=>{e.preventDefault();dc--;if(dc<=0){$drop.classList.remove('active');dc=0}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();dc=0;$drop.classList.remove('active');if(e.dataTransfer.files[0])handleFileSelect(e.dataTransfer.files[0])});

// clipboard paste
document.addEventListener('paste',e=>{const items=e.clipboardData?.items;if(!items)return;for(const it of items){if(it.type.startsWith('image/')){e.preventDefault();handleFileSelect(it.getAsFile());return}}});

function handleFileSelect(f){
  if(!f)return;
  const ext='.'+f.name.split('.').pop().toLowerCase();
  if(!['.jpg','.jpeg','.png','.gif','.webp','.pdf'].includes(ext)){alert('Supported: JPG, PNG, GIF, WEBP, PDF');return}
  if(f.size>10*1024*1024){alert('Max 10 MB');return}
  pendingFile=f;
  const th=document.getElementById('fileThumb');
  th.innerHTML=f.type.startsWith('image/')?`<img src="${URL.createObjectURL(f)}">`:'<div class="icon">📄</div>';
  document.getElementById('fileName').textContent=f.name;
  const kb=(f.size/1024).toFixed(0);
  document.getElementById('fileSize').textContent=kb>1024?(f.size/1024/1024).toFixed(1)+' MB':kb+' KB';
  $bar.classList.add('active');
}
function removeFile(){pendingFile=null;$bar.classList.remove('active');document.getElementById('fileInput').value=''}

function addMsg(text,type,o={}){
  const d=document.createElement('div');d.className=`message ${type}`;let h='';
  if(o.fileName&&type==='user'){if(o.thumbUrl)h+=`<img class="file-thumb" src="${o.thumbUrl}">`;h+=`<span class="file-badge">📄 ${o.fileName}</span><br>`}
  if(o.docType&&type==='bot')h+=`<span class="file-badge">📄 ${o.docType}</span><br>`;
  let escaped=escHtml(text);
  escaped=escaped.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  escaped=escaped.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
  h+=escaped.replace(/\n/g,'<br>');
  d.innerHTML=h;$m.appendChild(d);$m.scrollTop=$m.scrollHeight;
}
function addEsc(){const t=i18n[currentLang]||i18n.nl;const d=document.createElement('div');d.className='escalation';d.innerHTML='💡 '+t.escalationText+' <a href="https://taxnavigator-advice.nl/#contact" target="_blank">'+t.escalationBtn+'</a>';$m.appendChild(d);$m.scrollTop=$m.scrollHeight}
function showTyping(){const d=document.createElement('div');d.className='typing-indicator';d.id='typing';d.innerHTML='<span></span><span></span><span></span>';$m.appendChild(d);$m.scrollTop=$m.scrollHeight}
function hideTyping(){document.getElementById('typing')?.remove()}
function sendQuick(t){$i.value=t;sendMessage()}

async function sendMessage(){
  const text=$i.value.trim();
  if(!text&&!pendingFile)return;
  $qa.style.display='none';
  const mo={};let tu=null;
  if(pendingFile){mo.fileName=pendingFile.name;if(pendingFile.type.startsWith('image/'))mo.thumbUrl=tu=URL.createObjectURL(pendingFile)}
  addMsg(text||`📄 ${pendingFile?.name||''}`,'user',mo);
  $i.value='';$s.disabled=true;showTyping();
  try{
    let data;
    if(pendingFile){
      const fd=new FormData();fd.append('file',pendingFile);fd.append('message',text);
      if(sessionId)fd.append('session_id',sessionId);fd.append('channel','web');fd.append('lang',currentLang);
      data=await(await fetch(API_UP,{method:'POST',body:fd})).json();
      removeFile();
    }else{
      data=await(await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:sessionId,channel:'web',lang:currentLang})})).json();
    }
    hideTyping();sessionId=data.session_id;
    if(data.language&&data.language!==currentLang&&i18n[data.language])applyLanguage(data.language);
    addMsg(data.response,'bot',{docType:data.document_type});
    if(data.needs_escalation)addEsc();
  }catch(err){hideTyping();addMsg((i18n[currentLang]||i18n.nl).errorMsg,'bot');console.error(err)}
  finally{$s.disabled=false;$i.focus();if(tu)URL.revokeObjectURL(tu)}
}
// ── Voice recording ─────────────────────────────────────────────
const $mic=document.getElementById('micBtn');
let mediaRecorder=null,audioChunks=[],isRecording=false,savedPlaceholder='';

if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)$mic.style.display='none';

function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}

async function toggleRecording(){
  if(isRecording){mediaRecorder.stop();return}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    mediaRecorder=new MediaRecorder(stream,{mimeType});
    audioChunks=[];
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      isRecording=false;$mic.classList.remove('recording');
      document.getElementById('micIcon').innerHTML='<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>';
      $i.placeholder=savedPlaceholder;
      const blob=new Blob(audioChunks,{type:mimeType});
      if(blob.size<100)return;
      $qa.style.display='none';showTyping();$s.disabled=true;
      try{
        const fd=new FormData();fd.append('file',blob,'voice.webm');
        if(sessionId)fd.append('session_id',sessionId);
        fd.append('channel','web');
        const data=await(await fetch('/api/chat/voice',{method:'POST',body:fd})).json();
        hideTyping();
        if(data.error){addMsg(data.error,'bot');return}
        sessionId=data.session_id;
        if(data.transcription)addMsg(data.transcription,'user');
        if(data.language&&data.language!==currentLang&&i18n[data.language])applyLanguage(data.language);
        addMsg(data.response,'bot');
        if(data.needs_escalation)addEsc();
      }catch(err){hideTyping();addMsg((i18n[currentLang]||i18n.nl).errorMsg,'bot');console.error(err)}
      finally{$s.disabled=false;$i.focus()}
    };
    mediaRecorder.start();isRecording=true;
    $mic.classList.add('recording');
    document.getElementById('micIcon').innerHTML='<rect x="6" y="6" width="12" height="12" rx="2"/>';
    savedPlaceholder=$i.placeholder;$i.placeholder=(i18n[currentLang]||i18n.nl).recording;
  }catch(e){showToast((i18n[currentLang]||i18n.nl).micError);console.error(e)}
}

applyLanguage('nl');
</script>
</body>
</html>
